name: Publish Server Image

# Triggers:
# 1. Push to main when any source component changes (fast dev iterations)
# 2. Any published GitHub Release (for versioned tags like v1.2.3)
on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'workers/**'
      - 'dashboard/**'
      - 'Dockerfile.server'
      - 'scripts/server-start.sh'
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  # Must match your GitHub org: github.com/verfix-dev
  IMAGE_NAME: verfix-dev/verfix-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Required to push to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Docker build cache via GitHub Actions cache ──────────────────────
      # Layer caching dramatically speeds up subsequent builds by reusing
      # unchanged stages (especially the Playwright install layer).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_TOKEN is automatically provided — no extra secrets needed.

      # ── Image tags strategy ───────────────────────────────────────────────
      # On push to main  → ghcr.io/verfix-dev/verfix-server:main + :latest
      # On release v1.2.3 → :1.2.3 + :1.2 + :1 + :latest
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── Build and push ─────────────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # BuildKit inline cache — stored inside the image layer itself.
          # Alternative: use cache-from/cache-to with type=gha for faster CI.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build args for traceability — visible in `docker inspect`
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_REF=${{ github.ref_name }}

      # ── Summary ─────────────────────────────────────────────────────────────
      - name: Image digest summary
        run: |
          echo "### 🐳 Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pull: \`docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
