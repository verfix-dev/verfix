# Repo test CI: typecheck, build, package test suites, JSON-purity guard, and
# a dogfood run of verfix itself against testbed/ (local mode, strict, no AI key).
#
# This is NOT the Phase 4 GitHub Action product (PR comments, preview-URL
# verification, artifact presentation) — that ships separately, after Phase 2.
#
# The dashboard is not linted here: it is part of the frozen server mode and its
# build is exercised by publish-server.yml whenever dashboard/** changes.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node:
    name: CLI + engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install (workspaces link cli <-> workers <-> sdk)
        run: npm install

      # The engine builds first: @verfix/engine's types live in workers/dist,
      # so the cli typecheck cannot resolve the module until it exists.
      - name: Build engine
        run: cd workers && npm run build

      - name: Type check
        run: (cd cli && npx tsc --noEmit) && (cd workers && npx tsc --noEmit --skipLibCheck)

      - name: Build CLI
        run: cd cli && npm run build

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # Installed from workers/ so the browser version is resolved through the
      # engine's own Playwright dependency — same rule as cli/src/local-runner.ts.
      - name: Install Chromium
        run: cd workers && npx playwright install --with-deps chromium

      - name: Engine tests
        run: cd workers && npm test

      - name: CLI tests (includes local-runner e2e)
        run: cd cli && npm test

      - name: JSON purity guard
        run: bash cli/test/json-purity.sh

      - name: Dogfood — verfix verifies the testbed
        run: |
          node testbed/server.js &
          for i in $(seq 1 20); do
            curl -fs http://127.0.0.1:3947 >/dev/null && break
            sleep 0.5
          done
          node cli/dist/index.js run --config testbed/verfix.config.json --output json

      # Debugging aid for red runs only — not artifact handling for users.
      - name: Upload run traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verfix-traces
          path: .verfix/runs/
          if-no-files-found: ignore

  benchmark:
    name: Benchmark self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install (workspaces link cli <-> workers <-> sdk)
        run: npm install

      # The engine builds first: @verfix/engine's types live in workers/dist,
      # so the benchmark harness (which drives the CLI via ts-node) needs it.
      - name: Build engine
        run: cd workers && npm run build

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # Installed from workers/ so the browser version is resolved through the
      # engine's own Playwright dependency — same rule as cli/src/local-runner.ts.
      - name: Install Chromium
        run: cd workers && npx playwright install --with-deps chromium

      # null must stay at 0% closure (a case that closes without a fix isn't
      # actually broken) and oracle must stay at 100% (a case's own intended
      # fix must work) — run.js exits nonzero otherwise. This is a rot check
      # on the 8 benchmark cases, not a measurement of any real agent.
      - name: Benchmark self-test — null (floor, must be 0%)
        run: node benchmark/run.js --agent null

      - name: Benchmark self-test — oracle (ceiling, must be 100%)
        run: node benchmark/run.js --agent oracle

  api:
    name: Go API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Build and test
        run: cd api && go build ./... && go test ./...

      - name: gofmt
        run: |
          cd api
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:"
            echo "$unformatted"
            exit 1
          fi
